<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <linearGradient id="mtBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d5e"/>
      <stop offset="100%" style="stop-color:#1a5c42"/>
    </linearGradient>
    <linearGradient id="mtFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d5c"/>
      <stop offset="100%" style="stop-color:#0d2236"/>
    </linearGradient>

    <!-- Subtle sunset glow on left horizon -->
    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb84d;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#f07828"/>
    </radialGradient>

    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6bbd;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#1a6bbd"/>
      <stop offset="70%" style="stop-color:#4caf7d"/>
      <stop offset="100%" style="stop-color:#4caf7d;stop-opacity:0"/>
    </linearGradient>

    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000022"/>
    </filter>


    <clipPath id="iconClip">
      <circle cx="95" cy="100" r="71"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="520" height="200" fill="#ffffff" rx="8"/>

  <!-- Outer circle frame -->
  <circle cx="95" cy="100" r="72" fill="#f8fafb" stroke="#e2e8ed" stroke-width="1.5"/>

  <!-- Soft sunset horizon glow (distant, left-center) -->
  <circle cx="58" cy="108" r="22" fill="url(#sunHalo)" clip-path="url(#iconClip)"/>

  <!-- Back mountain range (drawn before sun so sun peeks between/behind) -->
  <polygon points="23,155 40,122 60,132 80,112 108,128 130,115 155,130 170,120 190,155"
    fill="url(#mtBack)" opacity="0.45"/>

  <!-- Small distant sun: sitting just above back mountain ridge, clipped so mountains overlap -->
  <circle cx="58" cy="108" r="8" fill="url(#sunCore)" filter="url(#sunGlow)"/>

  <!-- Front mountain range (overlaps sun, giving depth) -->
  <path d="M 23,158 Q 42,140 62,147 Q 77,136 95,130 Q 113,136 128,147 Q 148,140 167,158 Z"
    fill="url(#mtFront)"/>



  <!-- Forest treeline -->
  <g fill="#1a5c42" opacity="0.6">
    <polygon points="30,155 35,143 40,155"/>
    <polygon points="40,155 46,140 52,155"/>
    <polygon points="136,155 142,140 148,155"/>
    <polygon points="148,155 154,143 160,155"/>
  </g>

  <!-- Ground line -->
  <line x1="27" y1="155" x2="163" y2="155" stroke="#2e7d5e" stroke-width="1" opacity="0.4"/>

  <!-- AI Neural network dots -->
  <g opacity="0.75" filter="url(#subtleGlow)">
    <circle cx="36"  cy="170" r="2.5" fill="#1a6bbd"/>
    <circle cx="54"  cy="163" r="2"   fill="#4caf7d"/>
    <circle cx="68"  cy="172" r="2"   fill="#1a6bbd"/>
    <circle cx="83"  cy="165" r="2.5" fill="#4caf7d"/>
    <circle cx="95"  cy="174" r="2"   fill="#1a6bbd"/>
    <circle cx="107" cy="165" r="2.5" fill="#4caf7d"/>
    <circle cx="122" cy="172" r="2"   fill="#1a6bbd"/>
    <circle cx="136" cy="163" r="2"   fill="#4caf7d"/>
    <circle cx="154" cy="170" r="2.5" fill="#1a6bbd"/>
    <line x1="36"  y1="170" x2="54"  y2="163" stroke="#1a6bbd" stroke-width="0.8" opacity="0.55"/>
    <line x1="54"  y1="163" x2="68"  y2="172" stroke="#4caf7d" stroke-width="0.8" opacity="0.55"/>
    <line x1="68"  y1="172" x2="83"  y2="165" stroke="#1a6bbd" stroke-width="0.8" opacity="0.55"/>
    <line x1="83"  y1="165" x2="95"  y2="174" stroke="#4caf7d" stroke-width="0.8" opacity="0.55"/>
    <line x1="95"  y1="174" x2="107" y2="165" stroke="#1a6bbd" stroke-width="0.8" opacity="0.55"/>
    <line x1="107" y1="165" x2="122" y2="172" stroke="#4caf7d" stroke-width="0.8" opacity="0.55"/>
    <line x1="122" y1="172" x2="136" y2="163" stroke="#1a6bbd" stroke-width="0.8" opacity="0.55"/>
    <line x1="136" y1="163" x2="154" y2="170" stroke="#4caf7d" stroke-width="0.8" opacity="0.55"/>
    <line x1="54"  y1="163" x2="83"  y2="165" stroke="#2e7d5e" stroke-width="0.5" opacity="0.3"/>
    <line x1="83"  y1="165" x2="107" y2="165" stroke="#2e7d5e" stroke-width="0.5" opacity="0.3"/>
    <line x1="107" y1="165" x2="136" y2="163" stroke="#2e7d5e" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- === TYPOGRAPHY === -->
  <text x="208" y="80"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="13" fill="#2e7d5e" letter-spacing="4">那須</text>

  <line x1="208" y1="87" x2="490" y2="87" stroke="#e2e8ed" stroke-width="1"/>

  <text x="206" y="130"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="52" font-weight="bold"
    fill="#1a3d5c" letter-spacing="6"
    filter="url(#textShadow)">MAYA</text>

  <text x="210" y="153"
    font-family="'Georgia', serif"
    font-size="13" fill="#2e7d5e" letter-spacing="7.5">CREATIVES</text>

  <line x1="208" y1="160" x2="490" y2="160" stroke="#e2e8ed" stroke-width="1"/>

  <text x="210" y="175"
    font-family="'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif"
    font-size="9.5" fill="#8fa8b8" letter-spacing="2">合同会社　Nasu MAYA Creatives LLC</text>

  <!-- Connector line -->
  <path d="M 168 130 L 185 130 L 190 120 L 200 120"
    stroke="url(#circuitGrad)" stroke-width="1.2" fill="none" opacity="0.5"/>
  <circle cx="185" cy="130" r="1.5" fill="#1a6bbd" opacity="0.6"/>
  <circle cx="190" cy="120" r="1.5" fill="#4caf7d" opacity="0.6"/>

</svg>
